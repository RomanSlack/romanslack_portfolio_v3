<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout D: Numbered List - Iterated</title>
    <style>
        @font-face {
            font-family: 'Eloquia';
            src: url('../typekiln-eloquiadisplay-extrabold.otf') format('opentype');
            font-weight: 800;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0E0E0E;
            color: #F5F5F5;
            font-family: 'Eloquia', Arial, sans-serif;
        }

        /* =============================================
           HEADER
           ============================================= */
        header {
            padding: 50px 0 20px 80px;
            flex-shrink: 0;
            position: relative;
        }

        header h1 {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .back-arrow {
            position: absolute;
            left: 20px;
            top: 50px;
            color: #F5F5F5;
            text-decoration: none;
            font-size: 48px;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            line-height: 72px;
        }

        .back-arrow:hover { opacity: 0.7; }

        .header-subtitle {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.4;
            margin-bottom: 16px;
        }

        /* =============================================
           BADGE STYLES
           ============================================= */
        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            vertical-align: middle;
        }

        .badge-research { background-color: rgba(50, 50, 50, 0.85); }
        .badge-product { background-color: rgba(34, 139, 34, 0.85); }
        .badge-blog { background-color: rgba(59, 130, 246, 0.85); }
        .badge-hackathon { background-color: rgba(56, 132, 244, 0.85); }

        /* =============================================
           NUMBERED LIST
           ============================================= */
        .ld-content {
            padding: 20px 80px 0;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .ld-list {
            list-style: none;
        }

        .ld-item {
            border-bottom: 1px solid #1a1a1a;
        }

        .ld-item:first-child {
            border-top: 1px solid #1a1a1a;
        }

        .ld-item-link {
            display: grid;
            grid-template-columns: 60px 1fr 100px;
            gap: 30px;
            align-items: center;
            padding: 35px 0;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .ld-item-link:hover {
            opacity: 0.85;
        }

        /* Number */
        .ld-num {
            font-size: 48px;
            font-weight: 800;
            opacity: 0.12;
            line-height: 1;
            transition: opacity 0.4s;
        }

        .ld-item-link:hover .ld-num {
            opacity: 0.35;
        }

        /* Text */
        .ld-text h3 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.15;
        }

        .ld-text h3 .badge {
            transform: translateY(-4px);
            margin-left: 4px;
        }

        .ld-text p {
            font-size: 15px;
            opacity: 0.6;
            line-height: 1.5;
            max-width: 680px;
        }

        /* Right column: thumb + link icon stacked */
        .ld-right {
            justify-self: end;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s;
        }

        .ld-thumb {
            width: 100px;
            height: 70px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ld-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Link icon under thumbnail */
        .ld-link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.4;
            transition: opacity 0.3s;
        }

        .ld-link-icon svg {
            width: 18px;
            height: 18px;
            fill: #F5F5F5;
        }

        .ld-item-link:hover .ld-link-icon {
            opacity: 0.8;
        }

        /* Expanded image — hidden by default */
        .ld-expand {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.4s ease;
            opacity: 0;
        }

        .ld-item.open .ld-expand {
            max-height: 600px;
            opacity: 1;
        }

        .ld-expand-inner {
            margin-left: 90px; /* 60px number + 30px gap = text start */
            padding-bottom: 35px;
        }

        .ld-expand-inner img {
            max-width: 700px;
            max-height: 450px;
            width: auto;
            height: auto;
            display: block;
        }

        /* When item is open, hide the small thumb + icon */
        .ld-item.open .ld-right {
            opacity: 0;
        }

        /* Link icon in expanded view */
        .ld-expand-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            color: #F5F5F5;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .ld-expand-link:hover {
            opacity: 0.85;
        }

        .ld-expand-link svg {
            width: 16px;
            height: 16px;
            fill: #F5F5F5;
        }

        /* =============================================
           SEE ALL LINK
           ============================================= */
        .see-all-container {
            padding: 60px 80px 80px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .see-all-link {
            color: #F5F5F5;
            text-decoration: none;
            font-size: 24px;
            font-weight: 800;
            opacity: 0.5;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .see-all-link:hover { opacity: 0.8; }

        .see-all-arrow {
            font-size: 20px;
            transition: transform 0.3s;
        }

        .see-all-link:hover .see-all-arrow {
            transform: translateX(6px);
        }

        /* =============================================
           FOOTER
           ============================================= */
        footer {
            padding: 20px 0 30px 80px;
            text-align: left;
            flex-shrink: 0;
        }

        .footer-copyright {
            margin-bottom: 15px;
            font-size: 14px;
        }

        .footer-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .footer-links a {
            color: #F5F5F5;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer-links a:hover { opacity: 0.7; }
        .footer-links svg { width: 24px; height: 24px; fill: #F5F5F5; }

        /* =============================================
           RESPONSIVE
           ============================================= */
        @media (max-width: 1024px) {
            .ld-item-link {
                grid-template-columns: 50px 1fr 90px;
                gap: 20px;
            }
            .ld-num { font-size: 40px; }
            .ld-text h3 { font-size: 28px; }
            .ld-thumb { width: 90px; height: 60px; }
            .ld-expand-inner { margin-left: 70px; } /* 50px + 20px gap */
            .ld-link-icon svg { width: 16px; height: 16px; }
        }

        @media (max-width: 768px) {
            header { padding: 30px 20px 20px; }
            header h1 { font-size: 48px; }
            .back-arrow { font-size: 40px; left: 20px; top: 30px; }
            footer { padding: 15px 20px; }
            .see-all-container { padding: 40px 20px 60px; }
            .see-all-link { font-size: 20px; }

            .header-subtitle {
                font-size: 14px;
                text-align: center;
                padding-right: 0;
                margin-top: 12px;
                margin-bottom: 20px;
            }

            .ld-content { padding: 20px 20px 0; }

            .ld-item-link {
                grid-template-columns: 35px 1fr 70px;
                gap: 15px;
                padding: 25px 0;
            }

            .ld-num { font-size: 30px; }
            .ld-text h3 { font-size: 22px; }
            .ld-text p { font-size: 13px; }
            .ld-thumb { width: 70px; height: 50px; }
            .ld-link-icon svg { width: 14px; height: 14px; }

            .ld-expand-inner {
                margin-left: 0;
                padding-bottom: 25px;
            }

            .ld-expand-inner img {
                max-width: 100%;
                max-height: 350px;
            }

            .ld-item.open .ld-expand {
                max-height: 400px;
            }
        }

        @media (max-width: 480px) {
            header h1 { font-size: 36px; }
            .ld-text h3 { font-size: 19px; }
            .ld-text p { font-size: 12px; }
            .ld-num { font-size: 24px; }
            .ld-item-link { grid-template-columns: 28px 1fr 55px; gap: 12px; }
            .ld-thumb { width: 55px; height: 40px; }
            .ld-link-icon svg { width: 12px; height: 12px; }
            .see-all-link { font-size: 18px; }
        }
    </style>
</head>
<body>

        <a href="../index.html" class="back-arrow">&larr;</a>
        <h1>Projects</h1>
    </header>

        <ul class="ld-list" id="featuredList">

    <script>
        // =============================================
        // CONFIG: Featured project IDs in display order
        // Change these to swap which projects are featured
        // =============================================
        const FEATURED_IDS = [1, 2, 3, 4, 5, 6, 7];

        // SVG icons
        const ICON_GLOBE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>';
        const ICON_GITHUB = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>';
        const ICON_YOUTUBE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>';

        function getIcon(url) {
            if (isGitHub(url)) return ICON_GITHUB;
            if (isYouTube(url)) return ICON_YOUTUBE;
            return ICON_GLOBE;
        }

        function isGitHub(url) {
            return url && url.includes('github.com');
        }

        function isYouTube(url) {
            return url && (url.includes('youtube.com') || url.includes('youtu.be'));
        }

        function getLinkLabel(url) {
            if (isGitHub(url)) return 'View on GitHub';
            if (isYouTube(url)) return 'View on YouTube';
            return 'View website';
        }

        function getImageSrc(project) {
            return project.image || (project.images && project.images[0]) || '';
        }

        function buildBadges(project) {
            let html = '';
            if (project.research) html += ' <span class="badge badge-research">Research</span>';
            if (project.product) html += ' <span class="badge badge-product">Product</span>';
            if (project.blog) html += ' <span class="badge badge-blog">Blog</span>';
            if (project.hackathon) html += ' <span class="badge badge-hackathon">Hackathon</span>';
            return html;
        }

        async function init() {
            const res = await fetch('../projects.json');
            const allProjects = await res.json();

            // Get featured projects in the order specified
            const featured = FEATURED_IDS.map(id => allProjects.find(p => p.id === id)).filter(Boolean);
            const otherCount = allProjects.length - featured.length;

            // Update "see all" link
            document.getElementById('seeAllLink').innerHTML =
                `See ${otherCount} other projects <span class="see-all-arrow">&rarr;</span>`;

            // Build list
            const list = document.getElementById('featuredList');
            featured.forEach((project, i) => {
                const num = String(i + 1).padStart(2, '0');
                const icon = getIcon(project.link);
                const label = getLinkLabel(project.link);
                const imgSrc = getImageSrc(project);

                const li = document.createElement('li');
                li.className = 'ld-item';

                li.innerHTML = `
                    <div class="ld-item-link">
                        <span class="ld-num">${num}</span>
                        <div class="ld-text">
                            <h3>${project.title}${buildBadges(project)}</h3>
                            <p>${project.description}</p>
                        </div>
                        <div class="ld-right">
                            <div class="ld-thumb"><img src="../${imgSrc}" alt="${project.title}"></div>
                            <a href="${project.link}" target="_blank" class="ld-link-icon" aria-label="${label}">${icon}</a>
                        </div>
                    </div>
                    <div class="ld-expand">
                        <div class="ld-expand-inner">
                            <img src="../${imgSrc}" alt="${project.title}">
                            <a href="${project.link}" target="_blank" class="ld-expand-link">
                                ${icon}
                                ${label}
                            </a>
                        </div>
                    </div>
                `;

                list.appendChild(li);
            });
        }

        // Accordion toggle via event delegation
        document.getElementById('featuredList').addEventListener('click', (e) => {
            // Let real links navigate
            if (e.target.closest('.ld-link-icon') || e.target.closest('.ld-expand-link')) return;

            const itemLink = e.target.closest('.ld-item-link');
            if (!itemLink) return;

            const item = itemLink.closest('.ld-item');
            const wasOpen = item.classList.contains('open');

            // Close all
            document.querySelectorAll('.ld-item.open').forEach(el => el.classList.remove('open'));

            // Toggle
            if (!wasOpen) item.classList.add('open');
        });

        init();
    </script>
</body>
