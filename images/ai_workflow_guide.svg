<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="How I Build with AI Agents — an agent workflow by Roman Slack">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5DADE2" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#5DADE2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5DADE2" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="#0E0E0E"/>

  <!-- connecting rail -->
  <line x1="150" y1="265" x2="450" y2="265" stroke="url(#line)" stroke-width="2"/>

  <!-- three nodes: zero -> one -> rework -->
  <g filter="url(#glow)">
    <circle cx="150" cy="265" r="46" fill="none" stroke="#5DADE2" stroke-width="2"/>
    <circle cx="300" cy="265" r="46" fill="none" stroke="#5DADE2" stroke-width="2"/>
    <circle cx="450" cy="265" r="46" fill="none" stroke="#5DADE2" stroke-width="2"/>
  </g>

  <g fill="#F5F5F5" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="150" y="278" font-size="40" font-weight="700">0</text>
    <text x="300" y="278" font-size="40" font-weight="700">1</text>
    <!-- rework / loop glyph -->
    <text x="450" y="282" font-size="46" font-weight="400" fill="#5DADE2">&#x21BB;</text>
  </g>

  <!-- arrow heads on the rail -->
  <g fill="#5DADE2">
    <path d="M222 265 l-10 -5 v10 z"/>
    <path d="M372 265 l-10 -5 v10 z"/>
  </g>

  <!-- node captions -->
  <g fill="#8a8a8a" font-family="Arial, sans-serif" font-size="15" letter-spacing="2" text-anchor="middle">
    <text x="150" y="345">ZERO</text>
    <text x="300" y="345">FEATURE</text>
    <text x="450" y="345">REWORK</text>
  </g>

  <!-- title -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <text x="300" y="438" fill="#F5F5F5" font-size="42" font-weight="800">How I Build</text>
    <text x="300" y="486" fill="#F5F5F5" font-size="42" font-weight="800">with AI Agents</text>
    <text x="300" y="528" fill="#5DADE2" font-size="17" letter-spacing="3">AN AGENT WORKFLOW</text>
  </g>
</svg>
